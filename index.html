<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ニューエクスプレスプラス62言語診断</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

<h1>休日の過ごし方でわかる！<br>ニューエクスプレスプラス62言語診断</h1>

<form id="quiz">

<div class="question">
<h2>Q1</h2>
<p>説明書や地図は、最初から最後まで読むほうだ。</p>

<label><input type="radio" name="q1" value="Y"> YES</label>
<label><input type="radio" name="q1" value="N"> NO</label>
</div>

<div class="question">
<h2>Q2</h2>
<p>旅行に行くなら、有名な観光地よりも知らない町を歩いてみたい。</p>

<label><input type="radio" name="q2" value="Y"> YES</label>
<label><input type="radio" name="q2" value="N"> NO</label>
</div>

<div class="question">
<h2>Q3</h2>
<p>実用性よりも、心がときめくものを選びがちだ。</p>

<label><input type="radio" name="q3" value="Y"> YES</label>
<label><input type="radio" name="q3" value="N"> NO</label>
</div>

<button type="button" id="diagnose">診断する</button>

</form>

<div id="result"></div>

</div>

<script src="script.js"></script>

</body>
</html>
